spring:
  # 应用名称
  application:
    name: AI-Qwen

  # 应用名称

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/ai_qwen?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: hjh421678
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: MyHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: true



  data:
    redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

# ... existing code ...

server:
  port: 8080
  servlet:
    context-path: /AI-Qwen
  tomcat:
    uri-encoding: UTF-8

qwenApi:
  key: sk-5376f7a75c2e4f7ea983443538083204
  baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: deepseek-v3.2



# LangChain4j 配置
langchain4j:
  open-ai:
    chat-model:
      base-url: ${qwenApi.baseUrl}
      api-key: ${qwenApi.key}
      model-name: ${qwenApi.model}
      temperature: 0.7
      timeout: PT60S
      max-retries: 3
      log-requests: true
      log-responses: true
    # 如果需要流式输出，可以添加以下配置
    streaming-chat-model:
      base-url: ${qwenApi.baseUrl}
      api-key: ${qwenApi.key}
      model-name: ${qwenApi.model}
      temperature: 0.7
      timeout: PT60S
  community:
    dashscope:
      modelName: text-embedding-v4
      apiKey: ${qwenApi.key}
      baseUrl: ${qwenApi.baseUrl}

